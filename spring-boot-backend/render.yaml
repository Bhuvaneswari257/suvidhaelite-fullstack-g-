services:
  - type: web
    name: suvidha-elite-backend
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/spring-boot-backend-0.0.1-SNAPSHOT.jar
    port: 8080
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m -Xms512m
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: CORS_ORIGINS
        value: "https://your-frontend-url.onrender.com,https://your-frontend.com"
        sync: false
